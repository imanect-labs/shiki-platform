receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # トレース → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # メトリクス → Prometheus がスクレイプするエンドポイントとして公開
  prometheus:
    endpoint: 0.0.0.0:8889
  # ログ → Loki（OTLP ログを送る場合）
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
