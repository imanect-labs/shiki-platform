# shiki-platform — docker compose 一発起動。
# 依存（Postgres/Keycloak/OpenFGA/MinIO/Qdrant/ingestion-worker）＋ shiki-server。
# `cp .env.example .env && docker compose up --build`。
#
# 監視スタック（OTel collector/Tempo/Loki/Prometheus/Grafana）は `observability` profile に
# 隔離してある（開発機の RAM 節約）。使う時:
#   OTLP_ENDPOINT=http://otel-collector:4317 docker compose --profile observability up -d

name: shiki

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME: ${KC_PUBLIC_URL:-http://localhost:8081}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # KC 26 は management ポート 9000 で health を提供。bash の /dev/tcp で簡易確認。
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  openfga-migrate:
    image: openfga/openfga:v1.8.0
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/openfga?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  openfga:
    image: openfga/openfga:v1.8.0
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/openfga?sslmode=disable
      OPENFGA_LOG_FORMAT: json
    ports:
      - "8082:8080" # HTTP API
      - "8083:8081" # gRPC
      - "3003:3000" # playground
    depends_on:
      postgres:
        condition: service_healthy
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=localhost:8081"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    # BFF セッションストア（オパーク Cookie の実体。tenant_id スコープのキーで論理分離）。
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # ブラウザからの presigned PUT/GET（別オリジン: web → MinIO）を許可する CORS。
      # Drive UI（Task 1.10）はクライアント直転送のため必須。dev は全オリジン許可。
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333" # REST
    healthcheck:
      # イメージに curl が無いため TCP で確認する。
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  ingestion-worker:
    build:
      context: ../../ingestion-worker
    environment:
      # モデル（Ruri 埋め込み・reranker）は volume にキャッシュし、イメージには焼かない。
      HF_HOME: /models
      # server 側 SHIKI__RAG__EMBEDDING_MODEL_VERSION と必ず一致させる（不一致は
      # インジェスト時の版突合ガードで拒否される）。
      EMBED_MODEL: ${SHIKI__RAG__EMBEDDING_MODEL_VERSION:-cl-nagoya/ruri-v3-30m}
    volumes:
      - hf-cache:/models
    ports:
      # /parse は任意 URL を fetch する内部サービスのため、ホスト公開はローカルに限定する
      # （共有ホストでの SSRF/計算資源の踏み台化を防ぐ。コンテナ間は compose 網内で到達可能）。
      - "127.0.0.1:8090:8000"
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # サンドボックス orchestrator（非特権・code_interpreter 用）。gRPC を compose 網内で待ち受ける。
  # per-sandbox の secure-exec-sidecar 子プロセスを spawn する。ストレージ/DB クレデンシャルは持たない。
  sandbox-orchestrator:
    build:
      context: ../..
      dockerfile: deploy/docker/sandbox-orchestrator.Dockerfile
      args:
        # ゲストコマンドスイート（wasm）を同梱するか。重いビルドを避けたい dev は 0 に。
        BUILD_COMMANDS: ${SANDBOX_BUILD_COMMANDS:-1}
    environment:
      SANDBOX__LISTEN: 0.0.0.0:50000
      SECURE_EXEC_SIDECAR_BIN: /usr/local/bin/secure-exec-sidecar
      SANDBOX__COMMANDS_DIR: /opt/shiki/commands
    ports:
      # gRPC はローカルのみ公開（compose 網内は sandbox-orchestrator:50000 で到達）。
      - "127.0.0.1:50000:50000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          pids: 512

  # web 検索（オンプレ向け SearXNG・websearch profile でオプトイン起動）。
  # SaaS は Brave（SHIKI__WEBSEARCH__BRAVE_API_KEY）、テストは stub を使う。
  searxng:
    image: searxng/searxng:2025.6.20-f45eb1eec
    profiles: ["websearch"]
    environment:
      # JSON format を有効化した設定を読み込む（web_search プロバイダの応答形式）。
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    volumes:
      - ../searxng/settings.yml:/etc/searxng/settings.yml:ro
    ports:
      # ローカル確認用のみ公開（compose 網内は searxng:8080 で到達）。
      - "127.0.0.1:8081:8080"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m

  # --- 監視スタック（observability profile・オプトイン起動） ---
  tempo:
    image: grafana/tempo:2.6.1
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../otel/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.2.1
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.0.1
    profiles: ["observability"]
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ../otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus exporter (collector metrics)
    depends_on:
      - tempo
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["observability"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ../otel/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - prometheus
      - loki

  # Langfuse（self-host・LLM 可観測性）。llm-gateway が生成ごとに 1 trace を送る（Task 3.8）。
  # OTel trace_id を Langfuse trace id に使い、監査ログ↔Langfuse↔OTel を同一 trace_id で突合する。
  # 初回起動時に LANGFUSE_INIT_* で org/project/API キーを headless 作成する（gateway が使う鍵）。
  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3002}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-langfuse-dev-secret}
      SALT: ${LANGFUSE_SALT:-langfuse-dev-salt}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: shiki
      LANGFUSE_INIT_PROJECT_ID: shiki
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-shiki-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-shiki-dev}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@shiki.local}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-langfuse-dev-pass}
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  shiki-server:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
    environment:
      SHIKI__SERVER__HOST: "0.0.0.0"
      SHIKI__SERVER__PORT: "8080"
      SHIKI__DATABASE__URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/shiki
      SHIKI__AUTH__ISSUER: ${SHIKI__AUTH__ISSUER:-http://localhost:8081/realms/shiki}
      # サーバ側 OIDC 呼び出し（token 交換・JWKS）はコンテナ内部 URL を使う。
      # authorize/end-session は公開 issuer（ブラウザ向け）を使う。
      SHIKI__AUTH__INTERNAL_BASE_URL: ${SHIKI__AUTH__INTERNAL_BASE_URL:-http://keycloak:8080/realms/shiki}
      SHIKI__AUTH__AUDIENCE: ${SHIKI__AUTH__AUDIENCE:-shiki-api}
      # テナンシー: multi（claim `tenant` 由来で Postgres 分離）を dev 既定にし、dev_seed の
      # a-corp/b-corp テナントと一致させる（bare `docker compose up` でも共有検索が成立）。
      # multi は本番 fail-closed で、dev/test の明示 opt-in（SHIKI_DEV_ALLOW_MULTI_TENANT）が要る。
      SHIKI__AUTH__TENANCY: ${SHIKI__AUTH__TENANCY:-multi}
      SHIKI__AUTH__TENANT_ID: ${SHIKI__AUTH__TENANT_ID:-default}
      SHIKI_DEV_ALLOW_MULTI_TENANT: ${SHIKI_DEV_ALLOW_MULTI_TENANT:-true}
      SHIKI__AUTH__CLIENT_ID: ${SHIKI__AUTH__CLIENT_ID:-shiki-web}
      SHIKI__AUTH__CLIENT_SECRET: ${SHIKI__AUTH__CLIENT_SECRET:-shiki-web-dev-secret}
      # テナント・プロビジョニング（SAAS.2）。dev 既定で有効（realm の shiki-provisioner と一致）。
      SHIKI__AUTH__PROVISIONER_CLIENT_ID: ${SHIKI__AUTH__PROVISIONER_CLIENT_ID:-shiki-provisioner}
      SHIKI__AUTH__PROVISIONER_CLIENT_SECRET: ${SHIKI__AUTH__PROVISIONER_CLIENT_SECRET:-shiki-provisioner-dev-secret}
      # smoke（web 無し）では api 自身の callback を使う。実運用は web 同一オリジン（:3000）。
      SHIKI__AUTH__REDIRECT_URI: ${SHIKI__AUTH__REDIRECT_URI:-http://localhost:8080/auth/callback}
      SHIKI__AUTH__POST_LOGOUT_REDIRECT_URI: ${SHIKI__AUTH__POST_LOGOUT_REDIRECT_URI:-http://localhost:8080/}
      # ローカル HTTP 開発のため Cookie Secure を無効化（本番は true）。
      SHIKI__SESSION__REDIS_URL: redis://redis:6379
      SHIKI__SESSION__SECURE: "false"
      SHIKI__AUTHZ__BASE_URL: http://openfga:8080
      SHIKI__AUTHZ__STORE_NAME: shiki
      # 監視は observability profile のオプトイン。空 = OTel エクスポート無効。
      SHIKI__TELEMETRY__OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      SHIKI__TELEMETRY__SERVICE_NAME: shiki-server
      SHIKI__TELEMETRY__LOG_FORMAT: json
      SHIKI__STORAGE__BACKEND: minio
      # server→MinIO は内部ホスト、presigned URL はブラウザ到達可能ホストで署名する。
      SHIKI__STORAGE__S3__INTERNAL_ENDPOINT: http://minio:9000
      SHIKI__STORAGE__S3__PUBLIC_ENDPOINT: ${SHIKI__STORAGE__S3__PUBLIC_ENDPOINT:-http://localhost:9000}
      SHIKI__STORAGE__S3__BUCKET: ${SHIKI__STORAGE__S3__BUCKET:-shiki-blobs}
      SHIKI__STORAGE__S3__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SHIKI__STORAGE__S3__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # ブラウザ直 PUT/GET（別オリジン）には MinIO バケット CORS が要る。Drive UI（1.10）導入時に
      # config/TOML で storage.s3.cors_allowed_origins を配列指定する（env スカラは Vec に展開できない）。
      SHIKI__VECTOR__BACKEND: qdrant
      # LLM プロバイダ（Phase 3）。既定はオフラインで動く決定的スタブ（API キー不要でフルスタック
      # デモ/CI が回る）。実運用は BACKEND=openai＋BASE_URL＋API_KEY で OpenAI 互換（vLLM 含む）へ。
      SHIKI__LLM__BACKEND: ${SHIKI__LLM__BACKEND:-stub}
      SHIKI__LLM__BASE_URL: ${SHIKI__LLM__BASE_URL:-}
      SHIKI__LLM__API_KEY: ${SHIKI__LLM__API_KEY:-}
      SHIKI__LLM__DEFAULT_MODEL: ${SHIKI__LLM__DEFAULT_MODEL:-shiki-default}
      # Langfuse 計装（gateway 層が正・trace_id 起点で突合）。self-host の内部エンドポイント。
      SHIKI__LLM__LANGFUSE__BASE_URL: ${SHIKI__LLM__LANGFUSE__BASE_URL:-http://langfuse:3000}
      SHIKI__LLM__LANGFUSE__PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-shiki-dev}
      SHIKI__LLM__LANGFUSE__SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-shiki-dev}
      # チャット（Phase 3）。生成ワーカーを有効化（接続非依存生成）。
      SHIKI__CHAT__ENABLED: ${SHIKI__CHAT__ENABLED:-true}
      SHIKI__CHAT__WORKER_CONCURRENCY: ${SHIKI__CHAT__WORKER_CONCURRENCY:-4}
      # RAG（Phase 2）: インジェスト・パイプラインと検索。
      SHIKI__RAG__ENABLED: ${SHIKI__RAG__ENABLED:-true}
      SHIKI__CHAT__SANDBOX_ENDPOINT: http://sandbox-orchestrator:50000
      # web 検索（Phase 4 web ツール）。dev 既定は stub（決定的）。本番は brave / searxng。
      SHIKI__WEBSEARCH__BACKEND: ${SHIKI__WEBSEARCH__BACKEND:-stub}
      SHIKI__WEBSEARCH__BRAVE_API_KEY: ${SHIKI__WEBSEARCH__BRAVE_API_KEY:-}
      SHIKI__WEBSEARCH__SEARXNG_BASE_URL: ${SHIKI__WEBSEARCH__SEARXNG_BASE_URL:-http://searxng:8080}
      SHIKI__RAG__WORKER_BASE_URL: http://ingestion-worker:8000
      SHIKI__RAG__QDRANT_URL: http://qdrant:6333
      SHIKI__RAG__EMBEDDING_MODEL_VERSION: ${SHIKI__RAG__EMBEDDING_MODEL_VERSION:-cl-nagoya/ruri-v3-30m}
      SHIKI__RAG__INDEX_DATA_DIR: /var/lib/shiki/index
      # dev seed は明示フラグでのみ有効化（本番では設定しない）。
      SHIKI_DEV_SEED: ${SHIKI_DEV_SEED:-true}
      SHIKI_DEV_SEED_USER: ${SHIKI_DEV_SEED_USER:-00000000-0000-0000-0000-000000000001}
      SHIKI_DEV_SEED_ORG: ${SHIKI_DEV_SEED_ORG:-acme}
      RUST_LOG: "info,shiki_api=debug,authz=debug"
    ports:
      - "8080:8080"
    volumes:
      # Tantivy 全文インデックス（index-per-tenant）の永続化先。
      - shiki-index-data:/var/lib/shiki/index
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      openfga:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      # qdrant / ingestion-worker には依存しない: 検索・インジェストは遅延接続＋
      # リトライで吸収され、server 単体起動（CI smoke 等）で worker のビルドを
      # 強制しない。フルスタックは `docker compose up`（全サービス）で立ち上がる。
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
  minio-data:
  tempo-data:
  qdrant-data:
  hf-cache:
  shiki-index-data:
