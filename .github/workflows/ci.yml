name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt / clippy / test+coverage / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      # cargo test の代わりに llvm-cov 経由でテスト実行＋カバレッジ計測（OpenFGA 不要のユニットテストのみ。
      # live OpenFGA を要する authz 結合テストは compose-smoke ジョブで別途実行する）。
      - name: test + coverage (cargo-llvm-cov)
        run: cargo llvm-cov --all --no-report
      - name: coverage report (lcov + job summary)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          {
            echo '### Rust test coverage'
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # 閾値ゲート（段階的に引き上げる）。現状ベースライン 行 32.59% に対し、フレーク防止のため一旦 30% を床とする。
      - name: coverage gate (fail under threshold)
        run: cargo llvm-cov report --fail-under-lines 30
      - name: upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
      - run: cargo build --all

  web:
    name: Web (gen:api / lint / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: gen:api (Rust 定義から型生成)
        working-directory: web
        run: pnpm gen:api
      - name: lint
        working-directory: web
        run: pnpm lint
      - name: build
        working-directory: web
        run: pnpm build

  compose-smoke:
    name: compose smoke (/healthz, /me, skillex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: compose up (依存 + shiki-server)
        working-directory: deploy/compose
        run: |
          cp .env.example .env
          docker compose up -d --build shiki-server
      - name: wait for shiki-server healthy
        working-directory: deploy/compose
        run: |
          for i in $(seq 1 60); do
            s=$(docker compose ps shiki-server --format '{{.Health}}' || true)
            echo "attempt $i: health=$s"
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          echo "shiki-server が healthy になりませんでした"; exit 1
      - name: smoke test (BFF code フロー)
        working-directory: deploy/compose
        run: bash smoke-bff.sh

      - name: smoke test (skillex)
        working-directory: deploy/compose
        run: |
          set -euo pipefail
          echo "--- skillex client_credentials (aud=shiki-llm) ---"
          SK=$(curl -s -X POST http://localhost:8081/realms/shiki/protocol/openid-connect/token \
            -d grant_type=client_credentials -d client_id=skillex -d client_secret=skillex-dev-secret \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          echo "$SK" | cut -d. -f2 | python3 -c "import sys,base64,json; p=sys.stdin.read().strip(); p+='='*(-len(p)%4); c=json.loads(base64.urlsafe_b64decode(p)); a=c.get('aud'); a=a if isinstance(a,list) else [a]; assert 'shiki-llm' in a, a; print('skillex aud OK:', a, 'azp=', c.get('azp'))"
      - name: authz 結合テスト（live OpenFGA で allow/deny 検証）
        env:
          # compose で OpenFGA HTTP API はホスト 8082 に公開している。
          OPENFGA_TEST_URL: http://localhost:8082
        run: cargo test -p shiki-authz --test check -- --nocapture
      - name: dump logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200
