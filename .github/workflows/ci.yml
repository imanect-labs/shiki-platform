name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 既定の GITHUB_TOKEN を最小権限に絞る（各ジョブで必要に応じて昇格する）。
permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt / clippy / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo build --all

  coverage:
    name: Coverage (cargo-llvm-cov, gate 80%)
    runs-on: ubuntu-latest
    # カバレッジ表を PR にコメントするため pull-requests:write を昇格付与する。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # live 依存（OpenFGA / Redis）を起動し、結合テストのカバレッジも算入する。
      # これにより fga_http / client（OpenFGA 経路）と redis_store（Redis 経路）も
      # 単体テストでは届かない実経路をカバーした上で全体カバレッジを評価する。
      - name: compose up (postgres + minio + openfga + redis)
        working-directory: deploy/compose
        run: |
          cp .env.example .env
          docker compose up -d postgres minio openfga redis
      - name: wait for services healthy
        working-directory: deploy/compose
        run: |
          for svc in postgres minio openfga redis; do
            ok=""
            for i in $(seq 1 60); do
              s=$(docker compose ps "$svc" --format '{{.Health}}' || true)
              echo "[$svc] attempt $i: health=$s"
              [ "$s" = "healthy" ] && { ok=1; break; }
              sleep 5
            done
            [ -n "$ok" ] || { echo "$svc が healthy になりませんでした"; exit 1; }
          done
      # --no-report は llvm-cov 標準のクリーンアップを抑止するため、rust-cache が復元した
      # 過去の profraw/profdata が混入し得る。計測前に明示的に掃除して当該 run のみを反映させる。
      - name: clean stale coverage artifacts
        run: cargo llvm-cov clean --workspace
      # 単体＋結合テストをまとめて計測（各 *_TEST_* env を見て結合テストが実走する）。
      # storage の結合テストは postgres + minio + openfga 実体を使う（presigned/closure/監査を実経路で検証）。
      - name: test + coverage (cargo-llvm-cov)
        env:
          OPENFGA_TEST_URL: http://localhost:8082
          REDIS_TEST_URL: redis://localhost:6379
          STORAGE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/shiki
          STORAGE_TEST_S3_ENDPOINT: http://localhost:9000
        run: cargo llvm-cov --all --no-report
      - name: coverage report (lcov + summary + job summary)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          # サマリ表を再利用するためファイルに保存（Job Summary と PR コメントの両方で使う）。
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
          {
            echo '### Rust test coverage'
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # カバレッジ表を PR にコメントする（マーカーで既存コメントを更新＝スティッキー）。
      # ゲート fail 時も結果が見えるよう always() で実行する。push(main) では PR が無いのでスキップ。
      - name: comment coverage table on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          [ -f coverage-summary.txt ] || { echo "サマリ未生成のためスキップ"; exit 0; }
          marker='<!-- coverage-report -->'
          {
            echo "$marker"
            echo '## 📊 Rust test coverage'
            echo "閾値ゲート: 行 **80%** 以上（\`cargo llvm-cov --fail-under-lines 80\`）"
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } > body.md
          body="$(cat body.md)"
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
            --jq "[.[] | select(.user.login==\"github-actions[bot]\" and (.body | startswith(\"${marker}\")))] | last | .id")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -X PATCH -f body="$body" >/dev/null
            echo "既存コメントを更新: $existing"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$body" >/dev/null
            echo "新規コメントを作成"
          fi
      # 全体カバレッジ 80% の絶対床ゲート。下回ったら CI を fail させる（カバレッジを下げない）。
      # コメント投稿後に判定する（fail 時もコメントは投稿済み）。
      - name: coverage gate (fail under 80% lines)
        run: cargo llvm-cov report --fail-under-lines 80
      - name: upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
      - name: dump compose logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200

  web:
    name: Web (gen:api / lint / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: gen:api (Rust 定義から型生成)
        working-directory: web
        run: pnpm gen:api
      - name: lint
        working-directory: web
        run: pnpm lint
      - name: build
        working-directory: web
        run: pnpm build

  compose-smoke:
    name: compose smoke (/healthz, /me, skillex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: compose up (依存 + shiki-server)
        working-directory: deploy/compose
        run: |
          cp .env.example .env
          docker compose up -d --build shiki-server
      - name: wait for shiki-server healthy
        working-directory: deploy/compose
        run: |
          for i in $(seq 1 60); do
            s=$(docker compose ps shiki-server --format '{{.Health}}' || true)
            echo "attempt $i: health=$s"
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          echo "shiki-server が healthy になりませんでした"; exit 1
      - name: smoke test (BFF code フロー)
        working-directory: deploy/compose
        run: bash smoke-bff.sh

      - name: smoke test (skillex)
        working-directory: deploy/compose
        run: |
          set -euo pipefail
          echo "--- skillex client_credentials (aud=shiki-llm) ---"
          SK=$(curl -s -X POST http://localhost:8081/realms/shiki/protocol/openid-connect/token \
            -d grant_type=client_credentials -d client_id=skillex -d client_secret=skillex-dev-secret \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          echo "$SK" | cut -d. -f2 | python3 -c "import sys,base64,json; p=sys.stdin.read().strip(); p+='='*(-len(p)%4); c=json.loads(base64.urlsafe_b64decode(p)); a=c.get('aud'); a=a if isinstance(a,list) else [a]; assert 'shiki-llm' in a, a; print('skillex aud OK:', a, 'azp=', c.get('azp'))"
      - name: authz 結合テスト（live OpenFGA で allow/deny 検証）
        env:
          # compose で OpenFGA HTTP API はホスト 8082 に公開している。
          OPENFGA_TEST_URL: http://localhost:8082
        run: cargo test -p shiki-authz --test check -- --nocapture
      - name: dump logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200

  web-e2e:
    name: "Web E2E (Playwright: ログイン→保護ページ→ログアウト)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      # BFF を web オリジン(:3000)経由で回すため、redirect_uri を web に向ける。
      # （compose-smoke は web 無しで :8080 を使うが、E2E はブラウザが :3000 を見る）
      - name: compose up (keycloak + shiki-server)
        working-directory: deploy/compose
        env:
          SHIKI__AUTH__REDIRECT_URI: http://localhost:3000/auth/callback
          SHIKI__AUTH__POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
        run: |
          cp .env.example .env
          docker compose up -d --build shiki-server
      - name: wait for shiki-server healthy
        working-directory: deploy/compose
        run: |
          for i in $(seq 1 60); do
            s=$(docker compose ps shiki-server --format '{{.Health}}' || true)
            echo "attempt $i: health=$s"
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          echo "shiki-server が healthy になりませんでした"; exit 1
      - name: install (web)
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: gen:api (Rust 定義から型生成)
        working-directory: web
        run: pnpm gen:api
      - name: build (web)
        working-directory: web
        run: pnpm build
      - name: install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: run E2E (BFF + Keycloak 実フロー)
        working-directory: web
        env:
          CI: "true"
          BACKEND_ORIGIN: http://localhost:8080
        run: pnpm e2e
      - name: upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
      - name: dump compose logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200
