name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 既定の GITHUB_TOKEN を最小権限に絞る（各ジョブで必要に応じて昇格する）。
permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt / clippy / test / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all
      - run: cargo build --all

  quality:
    name: Quality gates (file-size / cargo-machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN を .git/config に残さない（後続サードパーティ処理からの窃取防止）。
          persist-credentials: false
      # 巨大ファイル gate は toolchain 不要（bash+git のみ）。最速で fail-fast させる。
      - name: file-size gate (1 ファイル 500 行以内)
        run: bash scripts/check-file-size.sh
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-machete
      - name: cargo machete (未使用依存の検出)
        # 所有フォーク vendor/ は独自ワークスペースで machete が解決できないため、自作の crates/ のみ対象にする。
        run: cargo machete crates

  cargo-deny:
    name: cargo-deny (advisories / licenses / bans / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN を .git/config に残さない（後続サードパーティ処理からの窃取防止）。
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  python:
    name: Python (ingestion-worker ruff / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ingestion-worker
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "ingestion-worker/uv.lock"
      - name: uv sync
        run: uv sync --frozen
      - name: ruff
        run: uv run ruff check .
      # 高速テストのみ（フェイクモデル）。Docling 実走・実モデルは slow マークで除外し、
      # compose 検証とローカルで担保する（CI 予算・モデル DL 回避）。
      - name: pytest (fast)
        run: uv run pytest -m "not slow" -q

  coverage:
    name: Coverage (cargo-llvm-cov, gate 80%)
    runs-on: ubuntu-latest
    # カバレッジ表を PR にコメントするため pull-requests:write を昇格付与する。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      # live 依存（OpenFGA / Redis）を起動し、結合テストのカバレッジも算入する。
      # これにより fga_http / client（OpenFGA 経路）と redis_store（Redis 経路）も
      # 単体テストでは届かない実経路をカバーした上で全体カバレッジを評価する。
      - name: compose up (postgres + minio + openfga + redis + qdrant)
        working-directory: deploy/compose
        run: |
          cp .env.example .env
          docker compose up -d postgres minio openfga redis qdrant
      - name: wait for services healthy
        working-directory: deploy/compose
        run: |
          for svc in postgres minio openfga redis qdrant; do
            ok=""
            for i in $(seq 1 60); do
              s=$(docker compose ps "$svc" --format '{{.Health}}' || true)
              echo "[$svc] attempt $i: health=$s"
              [ "$s" = "healthy" ] && { ok=1; break; }
              sleep 5
            done
            [ -n "$ok" ] || { echo "$svc が healthy になりませんでした"; exit 1; }
          done
      # --no-report は llvm-cov 標準のクリーンアップを抑止するため、rust-cache が復元した
      # 過去の profraw/profdata が混入し得る。計測前に明示的に掃除して当該 run のみを反映させる。
      - name: clean stale coverage artifacts
        run: cargo llvm-cov clean --workspace
      # 単体＋結合テストをまとめて計測（各 *_TEST_* env を見て結合テストが実走する）。
      # storage の結合テストは postgres + minio + openfga 実体を使う（presigned/closure/監査を実経路で検証）。
      - name: test + coverage (cargo-llvm-cov)
        env:
          OPENFGA_TEST_URL: http://localhost:8082
          REDIS_TEST_URL: redis://localhost:6379
          STORAGE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/shiki
          STORAGE_TEST_S3_ENDPOINT: http://localhost:9000
          RAG_TEST_QDRANT_URL: http://localhost:6333
        run: cargo llvm-cov --all --no-report
      - name: coverage report (lcov + summary + job summary)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex 'src/(bin/|main\.rs)|vendor/secure-exec/|sandbox-orchestrator/src/backend/wasm/|sandbox-orchestrator/src/backend/(gvisor|firecracker)/(instance|mod)\.rs|sandbox-guest-agent/src/vsock\.rs|sandbox-netns/src/lib\.rs|sandbox-client/src/client\.rs'
          # サマリ表を再利用するためファイルに保存（Job Summary と PR コメントの両方で使う）。
          cargo llvm-cov report --summary-only --ignore-filename-regex 'src/(bin/|main\.rs)|vendor/secure-exec/|sandbox-orchestrator/src/backend/wasm/|sandbox-orchestrator/src/backend/(gvisor|firecracker)/(instance|mod)\.rs|sandbox-guest-agent/src/vsock\.rs|sandbox-netns/src/lib\.rs|sandbox-client/src/client\.rs' | tee coverage-summary.txt
          {
            echo '### Rust test coverage'
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # カバレッジ表を PR にコメントする（マーカーで既存コメントを更新＝スティッキー）。
      # ゲート fail 時も結果が見えるよう always() で実行する。push(main) では PR が無いのでスキップ。
      - name: comment coverage table on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          [ -f coverage-summary.txt ] || { echo "サマリ未生成のためスキップ"; exit 0; }
          marker='<!-- coverage-report -->'
          {
            echo "$marker"
            echo '## 📊 Rust test coverage'
            echo "閾値ゲート: 行 **80%** 以上（\`cargo llvm-cov --fail-under-lines 80\`）"
            echo
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } > body.md
          body="$(cat body.md)"
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" \
            --jq "[.[] | select(.user.login==\"github-actions[bot]\" and (.body | startswith(\"${marker}\")))] | last | .id")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -X PATCH -f body="$body" >/dev/null
            echo "既存コメントを更新: $existing"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$body" >/dev/null
            echo "新規コメントを作成"
          fi
      # 全体カバレッジ 80% の絶対床ゲート。下回ったら CI を fail させる（カバレッジを下げない）。
      # コメント投稿後に判定する（fail 時もコメントは投稿済み）。
      - name: coverage gate (fail under 80% lines)
        # 除外: バイナリ entrypoint（配線のみ）・vendor（所有フォーク）・実 sidecar 駆動の I/O 境界
        # （sandbox の wasm backend / gRPC client は実 V8/Pyodide を要し gated IT `SANDBOX_IT=1` で検証・CI 分母外）
        run: cargo llvm-cov report --fail-under-lines 80 --ignore-filename-regex 'src/(bin/|main\.rs)|vendor/secure-exec/|sandbox-orchestrator/src/backend/wasm/|sandbox-orchestrator/src/backend/(gvisor|firecracker)/(instance|mod)\.rs|sandbox-guest-agent/src/vsock\.rs|sandbox-netns/src/lib\.rs|sandbox-client/src/client\.rs'
      - name: upload coverage (lcov)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
      - name: dump compose logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200

  web:
    name: Web (gen:api / lint / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: gen:api (Rust 定義から型生成)
        working-directory: web
        run: pnpm gen:api
      - name: lint
        working-directory: web
        run: pnpm lint
      - name: build
        working-directory: web
        run: pnpm build

  compose-smoke:
    name: compose smoke (/healthz, /me, skillex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: compose up (依存 + shiki-server)
        working-directory: deploy/compose
        env:
          # smoke は RAG（qdrant / ingestion-worker）を立てないため無効化する
          #（worker イメージビルドと Qdrant への再接続ノイズを避ける）。
          SHIKI__RAG__ENABLED: "false"
        run: |
          cp .env.example .env
          docker compose up -d --build shiki-server
      - name: wait for shiki-server healthy
        working-directory: deploy/compose
        run: |
          for i in $(seq 1 60); do
            s=$(docker compose ps shiki-server --format '{{.Health}}' || true)
            echo "attempt $i: health=$s"
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          echo "shiki-server が healthy になりませんでした"; exit 1
      - name: smoke test (BFF code フロー)
        working-directory: deploy/compose
        run: bash smoke-bff.sh

      - name: smoke test (skillex)
        working-directory: deploy/compose
        run: |
          set -euo pipefail
          echo "--- skillex client_credentials (aud=shiki-llm) ---"
          SK=$(curl -s -X POST http://localhost:8081/realms/shiki/protocol/openid-connect/token \
            -d grant_type=client_credentials -d client_id=skillex -d client_secret=skillex-dev-secret \
            | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])")
          echo "$SK" | cut -d. -f2 | python3 -c "import sys,base64,json; p=sys.stdin.read().strip(); p+='='*(-len(p)%4); c=json.loads(base64.urlsafe_b64decode(p)); a=c.get('aud'); a=a if isinstance(a,list) else [a]; assert 'shiki-llm' in a, a; print('skillex aud OK:', a, 'azp=', c.get('azp'))"
      - name: authz 結合テスト（live OpenFGA で allow/deny 検証）
        env:
          # compose で OpenFGA HTTP API はホスト 8082 に公開している。
          OPENFGA_TEST_URL: http://localhost:8082
        run: cargo test -p shiki-authz --test check -- --nocapture
      - name: dump logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200

  web-e2e:
    name: "Web E2E (Playwright: ログイン→保護ページ→ログアウト)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      # BFF を web オリジン(:3000)経由で回すため、redirect_uri を web に向ける。
      # （compose-smoke は web 無しで :8080 を使うが、E2E はブラウザが :3000 を見る）
      - name: compose up (keycloak + shiki-server)
        working-directory: deploy/compose
        env:
          SHIKI__AUTH__REDIRECT_URI: http://localhost:3000/auth/callback
          SHIKI__AUTH__POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
          # E2E は検索ページの表示スモークのみ（実インジェストは compose 検証で担保）。
          SHIKI__RAG__ENABLED: "false"
        run: |
          cp .env.example .env
          docker compose up -d --build shiki-server
      - name: wait for shiki-server healthy
        working-directory: deploy/compose
        run: |
          for i in $(seq 1 60); do
            s=$(docker compose ps shiki-server --format '{{.Health}}' || true)
            echo "attempt $i: health=$s"
            [ "$s" = "healthy" ] && exit 0
            sleep 5
          done
          echo "shiki-server が healthy になりませんでした"; exit 1
      - name: install (web)
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: gen:api (Rust 定義から型生成)
        working-directory: web
        run: pnpm gen:api
      - name: build (web)
        working-directory: web
        run: pnpm build
      - name: install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: run E2E (BFF + Keycloak 実フロー)
        working-directory: web
        env:
          CI: "true"
          BACKEND_ORIGIN: http://localhost:8080
        run: pnpm e2e
      - name: upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore
      - name: dump compose logs on failure
        if: failure()
        working-directory: deploy/compose
        run: docker compose logs --no-color | tail -200
